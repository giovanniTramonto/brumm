services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: brumm
      POSTGRES_USER: brumm
      POSTGRES_PASSWORD: brumm
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brumm']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
